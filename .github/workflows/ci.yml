name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Build & test atlas-core + atlas-mc
        run: ./gradlew :atlas-core:build :atlas-mc:build --no-daemon
      - name: Compile atlas-bench
        run: ./gradlew :atlas-bench:compileJmhJava --no-daemon

  bench-quick:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Run JMH (quick mode for CI smoke)
        run: ./gradlew :atlas-bench:jmh --no-daemon
      - name: Upload JMH results
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: atlas-bench/build/reports/jmh/results.json
